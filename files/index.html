<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalStream Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>GoalStream Dashboard</h1>
        </header>

        <section style="background: var(--card); padding: 25px; border-radius: 16px; margin-bottom: 40px; border: 1px solid #334155;">
            <h3>Create a Strategic Goal</h3>
            <form id="goalForm" enctype="multipart/form-data">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" name="title" placeholder="Goal Title (e.g. Save for Macbook)" required>
                    <select name="category">
                        <option value="Financial">Financial</option>
                        <option value="Academic">Academic</option>
                        <option value="Health">Health</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="number" name="target" placeholder="Target Amount" required>
                    <input type="file" name="image" accept="image/*">
                </div>
                <button type="submit" style="margin-top: 10px;">Create Goal</button>
            </form>
        </section>

        <div id="goalGrid" class="goal-grid">
            </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
