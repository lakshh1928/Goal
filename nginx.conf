events {}

http {

    include mime.types;

    upstream goals_backend {
        server app1:5000;
        server app2:5000;
    }

    server {

        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://goals_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /uploads/ {
            alias /app/uploads/;
        }

    }

}
